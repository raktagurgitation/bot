services:
  postgres:
    image: postgres:16-alpine
    container_name: botUsers
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: botDatabase
    ports:
      - '5454:5432'
    volumes:
      - pg_bot_data:/var/lib/postgresql/data

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: local_translator
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,ru



volumes:
  pg_bot_data: